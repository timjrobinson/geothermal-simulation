# Alembic config for the catalog DB (doc 04 §2.4 schema).
# Production schema path is Alembic migrations; tests use db.create_all().
# The DB URL is supplied at runtime (env var GEOSIM_DB_URL) so this file holds
# no engine secret; it defaults to the SQLite fallback (doc 04 §2.1).
[alembic]
script_location = %(here)s
prepend_sys_path = .
sqlalchemy.url = sqlite+pysqlite:///geosim_catalog.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
